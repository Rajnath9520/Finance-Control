name: Keep Render Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"   
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Backend Health Endpoint
        run: |
          echo "Pinging server..."
          for i in {1..3}; do
            curl -s --max-time 10 https://finance-control-x2kc.onrender.com/health && break
            echo "Retrying..."
            sleep 5
          done